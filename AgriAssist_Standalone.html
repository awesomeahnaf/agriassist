<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriAssist -Standalone</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f8fafc; }
        .primary-bg { background-color: #10b981; }
        .primary-text { color: #10b981; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Mock Data & Storage ---
        const STORAGE_KEY = 'agriassist_standalone_cases';
        const UPDATES_KEY = 'agriassist_standalone_updates';
        
        const initialCases = [
            { id: 'CASE-001', cropName: 'ধান', problemType: 'পোকা আক্রমণ', description: 'ধানের পাতায় বাদামী দাগ দেখা যাচ্ছে।', status: 'pending', date: '২০২৪-০৪-১০', imageUrl: 'https://picsum.photos/seed/rice/400/300' },
            { id: 'CASE-002', cropName: 'আলু', problemType: 'রোগ', description: 'আলু গাছের পাতা কোঁকড়ানো।', status: 'forwarded', date: '২০২৪-০৪-০৮', imageUrl: 'https://picsum.photos/seed/potato/400/300' }
        ];

        const initialUpdates = [
            { id: 'UP-001', title: 'বোরো ধানের ব্লাস্ট রোগ প্রতিরোধ', content: 'বর্তমান আবহাওয়ায় বোরো ধানে ব্লাস্ট রোগের প্রকোপ বাড়তে পারে। কৃষকদের নিয়মিত জমি পর্যবেক্ষণ করতে হবে।', date: '২০২৪-০৪-১২' }
        ];

        const getCases = () => {
            const stored = localStorage.getItem(STORAGE_KEY);
            return stored ? JSON.parse(stored) : initialCases;
        };

        const getUpdates = () => {
            const stored = localStorage.getItem(UPDATES_KEY);
            return stored ? JSON.parse(stored) : initialUpdates;
        };

        const saveCases = (cases) => localStorage.setItem(STORAGE_KEY, JSON.stringify(cases));
        const saveUpdates = (updates) => localStorage.setItem(UPDATES_KEY, JSON.stringify(updates));

        // --- Components ---
        const Layout = ({ children, user, onLogout }) => (
            <div className="min-h-screen flex flex-col">
                <nav className="bg-white border-b border-gray-100 px-6 py-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
                    <div className="flex items-center gap-2">
                        <div className="w-10 h-10 primary-bg rounded-xl flex items-center justify-center text-white font-bold text-xl">A</div>
                        <span className="text-xl font-bold text-gray-800">AgriAssist</span>
                    </div>
                    <div className="flex items-center gap-4">
                        <span className="text-sm font-bold text-gray-600 hidden md:block">{user.name} ({user.role})</span>
                        <button onClick={onLogout} className="text-sm font-bold text-red-500 hover:bg-red-50 px-3 py-2 rounded-lg transition-all">লগআউট</button>
                    </div>
                </nav>
                <main className="flex-1 p-6 max-w-6xl mx-auto w-full">{children}</main>
            </div>
        );

        const LoginPage = ({ onLogin }) => (
            <div className="min-h-screen flex items-center justify-center bg-slate-50 p-6">
                <div className="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md text-center">
                    <div className="w-20 h-20 primary-bg rounded-3xl mx-auto flex items-center justify-center text-white text-4xl font-bold mb-6 shadow-lg shadow-green-100">A</div>
                    <h1 className="text-3xl font-bold text-gray-800 mb-2">AgriAssist</h1>
                    <p className="text-gray-500 mb-8">কৃষি সহায়তায় আপনাকে স্বাগতম</p>
                    <div className="space-y-4">
                        <button onClick={() => onLogin({ name: 'আব্দুর রহমান', role: 'farmer' })} className="w-full py-4 bg-green-50 text-green-700 rounded-2xl font-bold border-2 border-green-100 hover:bg-green-100 transition-all">কৃষক হিসেবে প্রবেশ করুন</button>
                        <button onClick={() => onLogin({ name: 'অফিসার করিম', role: 'officer' })} className="w-full py-4 bg-blue-50 text-blue-700 rounded-2xl font-bold border-2 border-blue-100 hover:bg-blue-100 transition-all">অফিসার হিসেবে প্রবেশ করুন</button>
                        <button onClick={() => onLogin({ name: 'ডঃ হাসান', role: 'expert' })} className="w-full py-4 bg-purple-50 text-purple-700 rounded-2xl font-bold border-2 border-purple-100 hover:bg-purple-100 transition-all">বিশেষজ্ঞ হিসেবে প্রবেশ করুন</button>
                    </div>
                </div>
            </div>
        );

        const FarmerDashboard = () => {
            const [cases, setCasesList] = useState(getCases());
            const [updates, setUpdatesList] = useState(getUpdates());
            const [showForm, setShowForm] = useState(false);

            const handleSubmit = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const newCase = {
                    id: `CASE-${Date.now()}`,
                    cropName: formData.get('cropName'),
                    problemType: formData.get('problemType'),
                    description: formData.get('description'),
                    status: 'pending',
                    date: new Date().toLocaleDateString('bn-BD'),
                    imageUrl: 'https://picsum.photos/seed/' + Math.random() + '/400/300'
                };
                const updated = [...cases, newCase];
                setCasesList(updated);
                saveCases(updated);
                setShowForm(false);
            };

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <h1 className="text-2xl font-bold">আমার ফসলের সমস্যা</h1>
                        <button onClick={() => setShowForm(true)} className="primary-bg text-white px-6 py-3 rounded-xl font-bold shadow-lg shadow-green-100">+ নতুন সমস্যা</button>
                    </div>

                    {showForm && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-[60]">
                            <form onSubmit={handleSubmit} className="bg-white p-6 rounded-3xl w-full max-w-lg space-y-4">
                                <h2 className="text-xl font-bold">নতুন সমস্যা জমা দিন</h2>
                                <select name="cropName" required className="w-full p-3 bg-gray-50 border rounded-xl">
                                    <option value="">ফসল নির্বাচন করুন</option>
                                    <option value="ধান">ধান</option>
                                    <option value="আলু">আলু</option>
                                    <option value="টমেটো">টমেটো</option>
                                </select>
                                <select name="problemType" required className="w-full p-3 bg-gray-50 border rounded-xl">
                                    <option value="পোকা আক্রমণ">পোকা আক্রমণ</option>
                                    <option value="রোগ">রোগ</option>
                                    <option value="পুষ্টির অভাব">পুষ্টির অভাব</option>
                                </select>
                                <textarea name="description" required placeholder="বিস্তারিত বিবরণ..." className="w-full p-3 bg-gray-50 border rounded-xl h-32"></textarea>
                                <div className="flex gap-3">
                                    <button type="button" onClick={() => setShowForm(false)} className="flex-1 py-3 bg-gray-100 rounded-xl font-bold">বাতিল</button>
                                    <button type="submit" className="flex-1 py-3 primary-bg text-white rounded-xl font-bold">জমা দিন</button>
                                </div>
                            </form>
                        </div>
                    )}

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div className="lg:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-6">
                            {cases.map(c => (
                                <div key={c.id} className="bg-white rounded-3xl border overflow-hidden shadow-sm">
                                    <img src={c.imageUrl} className="w-full h-40 object-cover" />
                                    <div className="p-4">
                                        <div className="flex justify-between items-start mb-2">
                                            <h3 className="font-bold text-lg">{c.cropName}</h3>
                                            <span className={`text-xs px-2 py-1 rounded-full font-bold ${c.status === 'pending' ? 'bg-amber-100 text-amber-700' : 'bg-green-100 text-green-700'}`}>
                                                {c.status === 'pending' ? 'অপেক্ষমান' : 'সমাধান হয়েছে'}
                                            </span>
                                        </div>
                                        <p className="text-sm text-gray-600 mb-4">{c.description}</p>
                                        <div className="text-xs text-gray-400">{c.date} • {c.id}</div>
                                    </div>
                                </div>
                            ))}
                        </div>

                        <div className="lg:col-span-1 space-y-4">
                            <div className="bg-white p-6 rounded-3xl border">
                                <h2 className="font-bold text-lg mb-4 flex items-center gap-2">
                                    <span className="w-2 h-6 primary-bg rounded-full"></span>
                                    বিশেষজ্ঞ আপডেট
                                </h2>
                                <div className="space-y-4">
                                    {updates.map(u => (
                                        <div key={u.id} className="p-4 bg-gray-50 rounded-2xl border border-gray-100">
                                            <h3 className="font-bold text-gray-800 text-sm mb-1">{u.title}</h3>
                                            <p className="text-xs text-gray-600 line-clamp-2">{u.content}</p>
                                            {u.voiceUrl && (
                                                <div className="mt-2 pt-2 border-t border-gray-100">
                                                    <audio src={u.voiceUrl} controls className="w-full h-8" />
                                                </div>
                                            )}
                                            <div className="mt-2 text-[10px] text-gray-400">{u.date}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const ExpertDashboard = () => {
            const [cases, setCasesList] = useState(getCases());
            const [updates, setUpdatesList] = useState(getUpdates());
            const [showModal, setShowModal] = useState(false);

            const handlePostUpdate = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const newUpdate = {
                    id: `UP-${Date.now()}`,
                    title: formData.get('title'),
                    content: formData.get('content'),
                    date: new Date().toLocaleDateString('bn-BD')
                };
                const updated = [newUpdate, ...updates];
                setUpdatesList(updated);
                saveUpdates(updated);
                setShowModal(false);
            };

            const forwardedCases = cases.filter(c => c.status === 'forwarded');

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <h1 className="text-2xl font-bold">বিশেষজ্ঞ ড্যাশবোর্ড</h1>
                        <button onClick={() => setShowModal(true)} className="bg-purple-600 text-white px-6 py-3 rounded-xl font-bold shadow-lg shadow-purple-100">সাধারণ আপডেট পোস্ট করুন</button>
                    </div>

                    {showModal && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-[60]">
                            <form onSubmit={handlePostUpdate} className="bg-white p-6 rounded-3xl w-full max-w-lg space-y-4">
                                <h2 className="text-xl font-bold">সাধারণ আপডেট পোস্ট করুন</h2>
                                <input name="title" required placeholder="শিরোনাম..." className="w-full p-3 bg-gray-50 border rounded-xl" />
                                <textarea name="content" required placeholder="বিস্তারিত তথ্য..." className="w-full p-3 bg-gray-50 border rounded-xl h-32"></textarea>
                                <div className="flex gap-3">
                                    <button type="button" onClick={() => setShowModal(false)} className="flex-1 py-3 bg-gray-100 rounded-xl font-bold">বাতিল</button>
                                    <button type="submit" className="flex-1 py-3 bg-purple-600 text-white rounded-xl font-bold">পোস্ট করুন</button>
                                </div>
                            </form>
                        </div>
                    )}

                    <div className="grid grid-cols-1 gap-4">
                        {forwardedCases.map(c => (
                            <div key={c.id} className="bg-white p-6 rounded-3xl border flex justify-between items-center">
                                <div>
                                    <h3 className="font-bold text-lg">{c.cropName} - {c.problemType}</h3>
                                    <p className="text-sm text-gray-500">{c.description}</p>
                                </div>
                                <button className="bg-green-600 text-white px-4 py-2 rounded-xl text-sm font-bold">সমাধান দিন</button>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            if (!user) return <LoginPage onLogin={setUser} />;
            return (
                <Layout user={user} onLogout={() => setUser(null)}>
                    {user.role === 'farmer' && <FarmerDashboard />}
                    {user.role === 'expert' && <ExpertDashboard />}
                    {user.role === 'officer' && <div className="p-12 text-center text-gray-500">অফিসার ড্যাশবোর্ড এই ভার্সনে সীমাবদ্ধ।</div>}
                </Layout>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
